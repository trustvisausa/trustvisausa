<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendar Consulta Gratuita – Trust Visa USA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; font-size: 17px; background: #F8FAFC; color: #1E293B; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
    a { text-decoration: none; color: inherit; }

    /* HEADER */
    .header {
      background: white;
      border-bottom: 3px solid #C8102E;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(26,42,107,0.08);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo img { height: 56px; width: auto; }
    .logo-text { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 700; color: #1A2A6B; }
    .logo-text span { color: #C8102E; }
    .back-btn { color: #475569; font-size: 0.88rem; font-weight: 500; display: flex; align-items: center; gap: 6px; border: 1.5px solid #E2E8F0; border-radius: 50px; padding: 8px 16px; transition: 0.2s; }
    .back-btn:hover { color: #1A2A6B; border-color: #1A2A6B; }

    /* INTRO */
    .intro {
      text-align: center;
      padding: 40px 24px 8px;
    }
    .intro h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 4vw, 2.6rem); color: #1A2A6B; font-weight: 700; margin-bottom: 10px; }
    .intro p { color: #475569; font-size: 1rem; max-width: 480px; margin: 0 auto; line-height: 1.65; }
    .free-badge { display: inline-flex; align-items: center; gap: 6px; background: #ECFDF5; border: 1px solid #BBF7D0; border-radius: 50px; padding: 6px 14px; font-size: 0.8rem; font-weight: 600; color: #166534; margin-bottom: 14px; }

    /* CALENDLY */
    .calendly-wrap {
      flex: 1;
      padding: 0 16px 40px;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }
    .calendly-inline-widget {
      min-width: 320px;
      height: 700px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(26,42,107,0.10);
    }

    /* FOOTER */
    footer { text-align: center; padding: 20px; font-size: 0.78rem; color: #94A3B8; border-top: 1px solid #E2E8F0; }

    @media (max-width: 600px) {
      .header { padding: 12px 16px; }
      .logo img { height: 46px; }
      .calendly-inline-widget { height: 600px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo">
      <img src="logo.png" alt="Trust Visa USA" />
      <span class="logo-text">Trust <span>Visa</span> USA</span>
    </a>
    <a href="index.html" class="back-btn">← Volver al inicio</a>
  </header>

  <div class="intro">
    <div class="free-badge">✅ Consulta 100% Gratuita</div>
    <h1>Agendá tu Consulta</h1>
    <p>Elegí la fecha y hora que mejor te quede. Te confirmamos por email automáticamente.</p>
  </div>

  <div class="calendly-wrap">
    <div
      class="calendly-inline-widget"
      data-url="https://calendly.com/trustvisausa-info/30min?hide_gdpr_banner=1&primary_color=1a2a6b"
    ></div>
    <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
  </div>

  <footer>
    Trust Visa USA &nbsp;·&nbsp; info@trustvisausa.com &nbsp;·&nbsp; +1 (303) 434-3224
  </footer>

</body>
</html>
